  assemblies:
  - Crystal.Avalonia
  namespace: Crystal.Avalonia
  summary: >-
    The base application class, extending Avalonia's <xref href="Avalonia.Application" data-throw-if-not-resolved="false"></xref>.

    Provides the foundation for modular development and MVVM binding.
  remarks: >-
    Usage steps:


    <ol><li>Define modules: Create classes implementing <xref href="Crystal.Avalonia.IModule" data-throw-if-not-resolved="false"></xref>.</li><li>Override <xref href="Crystal.Avalonia.CrystalApplication.RegisterModules(Crystal.Avalonia.IModuleRegistrar)" data-throw-if-not-resolved="false"></xref>: Register all functional modules.</li><li>Override <xref href="Crystal.Avalonia.CrystalApplication.RegisterServices(Microsoft.Extensions.DependencyInjection.IServiceCollection)" data-throw-if-not-resolved="false"></xref>: Register application-level services (optional).</li><li>Override <xref href="Crystal.Avalonia.CrystalApplication.CreateShell(System.IServiceProvider)" data-throw-if-not-resolved="false"></xref>: Create the main window or main view.</li></ol>
  example:
  - >-
    <pre><code class="lang-csharp">public class MyApp : CrystalApplication

    {
        public override void RegisterModules(IModuleRegistrar moduleRegistrar)
        {
            moduleRegistrar.RegisterModule&lt;MyModule&gt;();
        }

        public override void RegisterServices(IServiceCollection services)
        {
            services.AddMvvmBindingTransient&lt;MainView, MainViewModel&gt;();
        }

        public override void CreateShell(IServiceProvider serviceProvider)
        {
            if (ApplicationLifetime is IClassicDesktopStyleApplicationLifetime desktop)
                desktop.MainWindow = new MainWindow();
        }
    }</code></pre>
