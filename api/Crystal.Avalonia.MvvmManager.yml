    path: Crystal.Avalonia/MvvmManager.cs
    startLine: 47
  assemblies:
  - Crystal.Avalonia
  namespace: Crystal.Avalonia
  summary: >-
    Registers a View and ViewModel pair as Transient mappings.

    Both the View and ViewModel are registered as Transient in the DI container.
  example:
  - <pre><code class="lang-csharp">services.AddMvvmBindingTransient&lt;MainView, MainViewModel&gt;();</code></pre>
  syntax:
    content: 'public static void AddMvvmBindingTransient<TView, TViewModel>(this IServiceCollection services) where TView : Control where TViewModel : class'
    parameters:
    - id: services
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
      description: The service collection.
    typeParameters:
    - id: TView
      description: The View type, must inherit from <xref href="Avalonia.Controls.Control" data-throw-if-not-resolved="false"></xref>.
    - id: TViewModel
      description: The ViewModel type, can be any class.
    content.vb: Public Shared Sub AddMvvmBindingTransient(Of TView As Control, TViewModel As Class)(services As IServiceCollection)
  overload: Crystal.Avalonia.MvvmManager.AddMvvmBindingTransient*
