  assemblies:
  - Crystal.Avalonia
  namespace: Crystal.Avalonia
  summary: Manages View-to-ViewModel mapping and MVVM binding registration.
  remarks: >-
    After registering View/ViewModel pairs using this class, the system will automatically:


    <ul><li>Inject the DataContext via <xref href="Crystal.Avalonia.ViewModelLocator" data-throw-if-not-resolved="false"></xref> when <xref href="Crystal.Avalonia.CrystalOptions.EnableViewModelLocator" data-throw-if-not-resolved="false"></xref> is enabled</li><li>Resolve the corresponding View via <xref href="Crystal.Avalonia.ViewLocator" data-throw-if-not-resolved="false"></xref> based on the ViewModel type</li></ul>
  example: []
