  assemblies:
  - Crystal.Avalonia
  namespace: Crystal.Avalonia
  summary: >-
    Override this method to register services that belong to this module.

    It is recommended to use <xref href="Crystal.Avalonia.MvvmManager.AddMvvmBindingTransient%60%602(Microsoft.Extensions.DependencyInjection.IServiceCollection)" data-throw-if-not-resolved="false"></xref>

    or <xref href="Crystal.Avalonia.MvvmManager.AddMvvmBindingSingleton%60%602(Microsoft.Extensions.DependencyInjection.IServiceCollection)" data-throw-if-not-resolved="false"></xref> to register View/ViewModel pairs.
