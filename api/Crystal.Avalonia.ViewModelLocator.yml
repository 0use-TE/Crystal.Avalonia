  assemblies:
  - Crystal.Avalonia
  namespace: Crystal.Avalonia
  summary: >-
    Provides automatic ViewModel binding via an attached property.

    Works in conjunction with <xref href="Crystal.Avalonia.CrystalOptions.EnableViewModelLocator" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    Usage in XAML:


    <pre><code class="lang-csharp">&lt;Window xmlns:vm="using:Crystal.Avalonia"
            vm:ViewModelLocator.AutoWireViewModel="True"&gt;</code></pre>

    When <code>AutoWireViewModel</code> is set to <code>True</code>,

    the system automatically resolves the corresponding ViewModel from the DI container

    and assigns it to the control's <code>DataContext</code>.
  example: []
